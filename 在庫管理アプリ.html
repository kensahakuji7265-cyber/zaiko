<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>在庫管理アプリ</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#222}
.app{max-width:480px;margin:0 auto;padding:12px}
h1{font-size:17px;font-weight:600;padding:12px 0 10px;color:#1a1a1a;text-align:center}
.tabs{display:flex;border:1px solid #ddd;border-radius:12px;overflow:hidden;margin-bottom:14px;background:#fff}
.tab{flex:1;padding:10px 4px;font-size:13px;font-weight:500;text-align:center;cursor:pointer;background:#fff;color:#888;border:none}
.tab.active{background:#f0f4ff;color:#2255cc}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:16px;margin-bottom:12px}
.section-label{font-size:12px;color:#888;margin-bottom:6px}
.scan-area{display:flex;gap:8px;margin-bottom:12px}
.scan-area input{flex:1;font-size:15px;padding:9px 12px;border:1px solid #ddd;border-radius:8px;outline:none}
.scan-area input:focus{border-color:#4a7cf7}
.scan-btn{padding:9px 14px;font-size:13px;white-space:nowrap;border-radius:8px;border:1px solid #ddd;background:#f5f5f5;color:#333;cursor:pointer;font-weight:500}
.qty-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.qty-row label{font-size:13px;color:#888;min-width:52px}
.qty-row input{width:90px;font-size:16px;font-weight:600;text-align:center;padding:8px;border:1px solid #ddd;border-radius:8px;outline:none}
.action-row{display:flex;gap:10px}
.btn-in{flex:1;padding:14px;font-size:15px;font-weight:600;border-radius:10px;border:none;cursor:pointer;background:#1D9E75;color:#fff}
.btn-out{flex:1;padding:14px;font-size:15px;font-weight:600;border-radius:10px;border:none;cursor:pointer;background:#378ADD;color:#fff}
.btn-in:active{opacity:.85}.btn-out:active{opacity:.85}
.btn-in:disabled,.btn-out:disabled{opacity:.4;cursor:not-allowed}
.preview{padding:10px 12px;background:#f5f5f5;border-radius:8px;margin-bottom:12px;display:none}
.pname{font-weight:600;font-size:15px}
.pinfo{color:#888;font-size:12px;margin-top:2px}
.pstock{color:#555;font-size:13px;margin-top:4px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:11px 22px;border-radius:24px;font-size:14px;font-weight:500;color:#fff;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;z-index:999}
.toast.in{background:#1D9E75}.toast.out{background:#378ADD}.toast.err{background:#e24b4a}.toast.show{opacity:1}
.log-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.log-item:last-child{border-bottom:none}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge.in{background:#e1f5ee;color:#0F6E56}.badge.out{background:#e6f1fb;color:#185FA5}
.log-info{flex:1}.log-name{font-weight:500}.log-meta{color:#888;font-size:12px;margin-top:1px}
.log-qty{font-weight:600;font-size:14px}.log-qty.in{color:#1D9E75}.log-qty.out{color:#378ADD}
.stock-item{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0f0;gap:10px}
.stock-item:last-child{border-bottom:none}
.stock-info{flex:1}.stock-name{font-weight:500;font-size:14px}.stock-sub{color:#888;font-size:12px;margin-top:1px}
.stock-num{font-size:16px;font-weight:600;text-align:right}.stock-num.ok{color:#1D9E75}.stock-num.low{color:#e24b4a}
.stock-label{font-size:11px;font-weight:400;color:#888}
.empty{text-align:center;padding:28px;color:#aaa;font-size:13px}
.reg-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.reg-grid>div{display:flex;flex-direction:column;gap:4px}
.reg-grid label{font-size:12px;color:#888}
.reg-grid input{padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none}
.reg-grid input:focus{border-color:#4a7cf7}
.reg-btn{width:100%;padding:12px;font-size:14px;font-weight:600;border-radius:10px;border:1px solid #ddd;cursor:pointer;background:#f5f5f5;color:#333;margin-top:6px}
.loading{text-align:center;padding:20px;color:#aaa;font-size:13px}
.sync-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#fff;border:1px solid #e5e5e5;border-radius:10px;margin-bottom:12px;font-size:12px;color:#666}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;background:#1D9E75}
.dot.spin{background:#EF9F27;animation:pulse 1s infinite}
.dot.err{background:#e24b4a}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#reader{width:100%;margin-bottom:8px;border-radius:10px;overflow:hidden;display:none}
#reader__dashboard{display:none !important}
.stop-btn{width:100%;padding:10px;font-size:13px;font-weight:500;border-radius:8px;border:1px solid #fcc;background:#fff0f0;color:#e24b4a;cursor:pointer;margin-bottom:10px;display:none}
/* ログイン画面 */
.login-wrap{position:fixed;inset:0;background:#f5f5f5;display:flex;align-items:center;justify-content:center;z-index:9999}
.login-card{background:#fff;border:1px solid #e5e5e5;border-radius:16px;padding:32px 24px;width:320px;text-align:center}
.login-card h2{font-size:18px;font-weight:700;margin-bottom:6px;color:#1a1a1a}
.login-card p{font-size:13px;color:#888;margin-bottom:20px}
.login-card input{width:100%;padding:12px;font-size:15px;border:1px solid #ddd;border-radius:8px;outline:none;text-align:center;margin-bottom:12px;letter-spacing:2px}
.login-card input:focus{border-color:#4a7cf7}
.login-btn{width:100%;padding:13px;font-size:15px;font-weight:600;border-radius:10px;border:none;cursor:pointer;background:#2255cc;color:#fff}
.login-btn:active{opacity:.85}
.login-err{color:#e24b4a;font-size:13px;margin-top:8px;display:none}
</style>
</head>
<body>

<!-- ログイン画面 -->
<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <h2>📦 在庫管理</h2>
    <p>パスワードを入力してください</p>
    <input type="password" id="pw-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="login-btn" onclick="doLogin()">ログイン</button>
    <div class="login-err" id="login-err">パスワードが違います</div>
  </div>
</div>

<div class="app" id="main-app" style="display:none">
  <h1>📦 在庫管理</h1>

  <div class="sync-bar">
    <span><span class="dot" id="dot"></span><span id="sync-msg">接続中...</span></span>
    <button onclick="refreshAll()" style="font-size:12px;padding:3px 10px;border-radius:8px;border:1px solid #ddd;background:#f5f5f5;cursor:pointer">更新</button>
    <button onclick="doLogout()" style="font-size:12px;padding:3px 10px;border-radius:8px;border:1px solid #ddd;background:#f5f5f5;cursor:pointer;color:#e24b4a">ログアウト</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('scan')">スキャン</button>
    <button class="tab" onclick="showTab('stock')">在庫一覧</button>
    <button class="tab" onclick="showTab('log')">履歴</button>
    <button class="tab" onclick="showTab('reg')">商品登録</button>
  </div>

  <div id="tab-scan">
    <div class="card">
      <div class="section-label">JANコード</div>
      <div id="reader"></div>
      <button class="stop-btn" id="stop-btn" onclick="stopCam()">■ カメラを停止</button>
      <div class="scan-area">
        <input type="text" id="jan-input" placeholder="4901234567890" inputmode="numeric"
          oninput="onJanInput(this.value)" onkeydown="if(event.key==='Enter')lookupJan()"/>
        <button class="scan-btn" id="cam-btn" onclick="startCam()">📷 カメラ</button>
      </div>
      <div class="preview" id="preview">
        <div class="pname" id="prev-name"></div>
        <div class="pinfo" id="prev-info"></div>
        <div class="pstock">現在庫: <span id="prev-stock"></span> 個</div>
      </div>
      <div class="qty-row">
        <label>数量</label>
        <input type="number" id="qty-input" value="1" min="1" max="9999"/>
      </div>
      <div class="action-row">
        <button class="btn-in" id="btn-in" onclick="doRecord('in')">入庫</button>
        <button class="btn-out" id="btn-out" onclick="doRecord('out')">出庫</button>
      </div>
    </div>
  </div>

  <div id="tab-stock" style="display:none">
    <div class="card"><div id="stock-list"><div class="loading">読み込み中...</div></div></div>
  </div>

  <div id="tab-log" style="display:none">
    <div class="card"><div id="log-list"><div class="loading">読み込み中...</div></div></div>
  </div>

  <div id="tab-reg" style="display:none">
    <div class="card">
      <div class="section-label">新規商品登録</div>
      <div class="reg-grid">
        <div><label>JANコード ＊</label><input type="text" id="reg-jan" placeholder="4901234567890" inputmode="numeric"/></div>
        <div><label>商品名 ＊</label><input type="text" id="reg-name" placeholder="商品名"/></div>
        <div><label>項目</label><input type="text" id="reg-cat1" placeholder="例：食品"/></div>
        <div><label>種類</label><input type="text" id="reg-cat2" placeholder="例：飲料"/></div>
        <div><label>規格</label><input type="text" id="reg-spec" placeholder="例：500ml×24"/></div>
        <div><label>初期在庫</label><input type="number" id="reg-init" value="0" min="0"/></div>
        <div><label>安全在庫</label><input type="number" id="reg-safe" value="5" min="0"/></div>
      </div>
      <button class="reg-btn" onclick="registerProduct()">登録する</button>
    </div>
    <div class="card">
      <div class="section-label">登録済み商品</div>
      <div id="reg-list"><div class="loading">読み込み中...</div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbwZBCyD9YMa5-jh4x7q6bnH69eiW1C-90QQygAJKEJniACBStwswCYWNPmGtUgYa_k1pw/exec';
let products=[];
let html5QrCode=null;
let PW='';

// ログイン
function doLogin(){
  const pw=document.getElementById('pw-input').value;
  if(!pw){return;}
  PW=pw;
  // パスワードを検証するためにAPIを叩く
  api({action:'getProducts'}).then(data=>{
    if(data.error==='パスワードが違います'){
      document.getElementById('login-err').style.display='block';
      PW='';
    } else {
      products=data.products||[];
      document.getElementById('login-wrap').style.display='none';
      document.getElementById('main-app').style.display='block';
      setSync('ok','スプレッドシート連携中');
    }
  }).catch(()=>{
    document.getElementById('login-err').style.display='block';
    PW='';
  });
}

function doLogout(){
  PW='';
  document.getElementById('pw-input').value='';
  document.getElementById('login-err').style.display='none';
  document.getElementById('login-wrap').style.display='flex';
  document.getElementById('main-app').style.display='none';
  stopCam();
}

async function api(params){
  const url=GAS_URL+'?'+new URLSearchParams({...params,pw:PW}).toString();
  const res=await fetch(url);
  return res.json();
}

function setSync(state,msg){
  const d=document.getElementById('dot');
  d.className='dot'+(state==='loading'?' spin':state==='err'?' err':'');
  document.getElementById('sync-msg').textContent=msg;
}

async function loadProducts(){
  setSync('loading','読み込み中...');
  try{
    const data=await api({action:'getProducts'});
    if(data.error)throw new Error(data.error);
    products=data.products||[];
    setSync('ok','スプレッドシート連携中');
    return true;
  }catch(e){
    setSync('err','接続エラー');
    return false;
  }
}

async function refreshAll(){
  await loadProducts();
  const idx=Array.from(document.querySelectorAll('.tab')).findIndex(e=>e.classList.contains('active'));
  if(idx===1)renderStock();
  if(idx===2)await loadAndRenderLog();
  if(idx===3)renderRegList();
}

function showTab(t){
  ['scan','stock','log','reg'].forEach(id=>{
    document.getElementById('tab-'+id).style.display=id===t?'':'none';
  });
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('active',['scan','stock','log','reg'][i]===t);
  });
  if(t==='stock'){loadProducts().then(renderStock);}
  if(t==='log')loadAndRenderLog();
  if(t==='reg'){loadProducts().then(renderRegList);}
  if(t!=='scan')stopCam();
}

function toast(msg,type='in'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast '+type+' show';
  setTimeout(()=>el.classList.remove('show'),2500);
}

function onJanInput(v){
  if(v.length>=8)lookupJan();
  else document.getElementById('preview').style.display='none';
}

function lookupJan(){
  const jan=document.getElementById('jan-input').value.trim();
  const p=products.find(p=>p.jan===jan);
  const pr=document.getElementById('preview');
  if(p){
    document.getElementById('prev-name').textContent=p.name;
    const info=[p.category1,p.category2,p.spec].filter(Boolean).join(' / ');
    document.getElementById('prev-info').textContent=info;
    document.getElementById('prev-stock').textContent=p.stock;
    pr.style.display='';
  }else{
    pr.style.display='none';
  }
}

async function doRecord(type){
  const jan=document.getElementById('jan-input').value.trim();
  const qty=parseInt(document.getElementById('qty-input').value)||1;
  if(!jan){toast('JANコードを入力してください','err');return;}
  const bi=document.getElementById('btn-in');
  const bo=document.getElementById('btn-out');
  bi.disabled=bo.disabled=true;
  setSync('loading','記録中...');
  try{
    const data=await api({action:'record',jan,qty,type});
    if(data.error){toast(data.error,'err');setSync('ok','スプレッドシート連携中');}
    else{
      toast(data.name+' '+(type==='in'?'入庫':'出庫')+' '+qty+'個（在庫: '+data.stock+'）',type);
      document.getElementById('jan-input').value='';
      document.getElementById('qty-input').value='1';
      document.getElementById('preview').style.display='none';
      await loadProducts();
    }
  }catch(e){
    toast('通信エラーが発生しました','err');
    setSync('err','接続エラー');
  }
  bi.disabled=bo.disabled=false;
}

function renderStock(){
  const el=document.getElementById('stock-list');
  if(!products.length){el.innerHTML='<div class="empty">商品がまだ登録されていません</div>';return;}
  el.innerHTML=products.map(p=>{
    const low=p.stock<=p.safe;
    const sub=[p.category1,p.category2,p.spec].filter(Boolean).join(' / ');
    return`<div class="stock-item">
      <div class="stock-info"><div class="stock-name">${p.name}</div><div class="stock-sub">${sub||p.jan}</div></div>
      <div class="stock-num ${low?'low':'ok'}">${p.stock}<span class="stock-label"> 個${low?' ⚠️':''}</span></div>
    </div>`;
  }).join('');
}

async function loadAndRenderLog(){
  const el=document.getElementById('log-list');
  el.innerHTML='<div class="loading">読み込み中...</div>';
  try{
    const data=await api({action:'getLogs'});
    const logs=data.logs||[];
    if(!logs.length){el.innerHTML='<div class="empty">履歴がまだありません</div>';return;}
    el.innerHTML=logs.map(l=>{
      const sub=[l.category1,l.category2].filter(Boolean).join(' / ');
      return`<div class="log-item">
        <span class="badge ${l.type}">${l.type==='in'?'入庫':'出庫'}</span>
        <div class="log-info">
          <div class="log-name">${l.name}${sub?' <span style="color:#bbb;font-size:11px">'+sub+'</span>':''}</div>
          <div class="log-meta">${l.time}　在庫: ${l.stock}</div>
        </div>
        <div class="log-qty ${l.type}">${l.type==='in'?'+':'-'}${l.qty}</div>
      </div>`;
    }).join('');
  }catch(e){
    el.innerHTML='<div class="empty">読み込みに失敗しました</div>';
  }
}

function renderRegList(){
  const el=document.getElementById('reg-list');
  if(!products.length){el.innerHTML='<div class="empty">商品がまだ登録されていません</div>';return;}
  el.innerHTML=products.map(p=>{
    const sub=[p.category1,p.category2,p.spec].filter(Boolean).join(' / ');
    return`<div class="stock-item">
      <div class="stock-info"><div class="stock-name">${p.name}</div><div class="stock-sub">${sub||p.jan}</div></div>
      <button onclick="deleteProduct('${p.jan}')" style="font-size:12px;padding:5px 12px;border-radius:8px;border:1px solid #ddd;background:#f5f5f5;cursor:pointer;white-space:nowrap">削除</button>
    </div>`;
  }).join('');
}

async function registerProduct(){
  const jan=document.getElementById('reg-jan').value.trim();
  const name=document.getElementById('reg-name').value.trim();
  const category1=document.getElementById('reg-cat1').value.trim();
  const category2=document.getElementById('reg-cat2').value.trim();
  const spec=document.getElementById('reg-spec').value.trim();
  const stock=document.getElementById('reg-init').value;
  const safe=document.getElementById('reg-safe').value;
  if(!jan||!name){toast('JANコードと商品名は必須です','err');return;}
  setSync('loading','登録中...');
  try{
    const data=await api({action:'addProduct',jan,name,category1,category2,spec,stock,safe});
    if(data.error){toast(data.error,'err');setSync('ok','スプレッドシート連携中');return;}
    toast(name+'を登録しました','in');
    ['reg-jan','reg-name','reg-cat1','reg-cat2','reg-spec'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('reg-init').value='0';
    document.getElementById('reg-safe').value='5';
    await loadProducts();
    renderRegList();
  }catch(e){
    toast('通信エラーが発生しました','err');
    setSync('err','接続エラー');
  }
}

async function deleteProduct(jan){
  const p=products.find(p=>p.jan===jan);
  if(!confirm(p?.name+'を削除しますか？'))return;
  try{
    const data=await api({action:'deleteProduct',jan});
    if(data.error){toast(data.error,'err');return;}
    toast('削除しました','err');
    await loadProducts();
    renderRegList();
  }catch(e){
    toast('通信エラーが発生しました','err');
  }
}

async function startCam(){
  document.getElementById('reader').style.display='block';
  document.getElementById('stop-btn').style.display='block';
  document.getElementById('cam-btn').style.display='none';
  try{
    html5QrCode=new Html5Qrcode('reader');
    const devices=await Html5Qrcode.getCameras();
    if(!devices||devices.length===0){toast('カメラが見つかりません','err');stopCam();return;}
    const backCam=devices.find(d=>
      d.label.toLowerCase().includes('back')||
      d.label.toLowerCase().includes('rear')||
      d.label.toLowerCase().includes('environment'));
    const camId=backCam?backCam.id:devices[devices.length-1].id;
    await html5QrCode.start(camId,
      {fps:30,qrbox:{width:300,height:150},aspectRatio:1.7,
       experimentalFeatures:{useBarCodeDetectorIfSupported:true},
       formatsToSupport:[
         Html5QrcodeSupportedFormats.EAN_13,
         Html5QrcodeSupportedFormats.EAN_8,
         Html5QrcodeSupportedFormats.UPC_A,
         Html5QrcodeSupportedFormats.UPC_E,
         Html5QrcodeSupportedFormats.CODE_128,
       ]},
      (code)=>{
        document.getElementById('jan-input').value=code;
        stopCam();lookupJan();
        toast('スキャン完了: '+code,'in');
      },()=>{});
  }catch(e){
    toast('カメラを起動できませんでした','err');stopCam();
  }
}

async function stopCam(){
  if(html5QrCode){
    try{if(html5QrCode.getState()===2)await html5QrCode.stop();}catch(e){}
    html5QrCode=null;
  }
  document.getElementById('reader').style.display='none';
  document.getElementById('reader').innerHTML='';
  document.getElementById('stop-btn').style.display='none';
  document.getElementById('cam-btn').style.display='block';
}
</script>
</body>
</html>
